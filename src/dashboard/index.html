<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pre-Sales Monitoring Dashboard | GiftedWorld</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎯</text></svg>">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <h1><i class="fas fa-tasks"></i> Lead Management System</h1>
            </div>
            <div class="header-actions">
                <button class="btn btn-secondary" id="refreshBtn">
                    <i class="fas fa-sync-alt"></i> Refresh
                </button>
                <button class="btn btn-primary" id="exportBtn">
                    <i class="fas fa-download"></i> Export
                </button>
            </div>
        </div>
    </header>

    <!-- Loading Spinner -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <p>Loading dashboard data...</p>
    </div>

    <!-- Main Container -->
    <div class="container">
        <!-- Case Management Queue -->
        <section class="queue-section">
            <h2 class="section-title">Lead Assignment Queue</h2>
            <div class="queue-controls">
                <div class="queue-stats">
                    <div class="stat-item">
                        <span class="stat-number" id="unassignedCount">-</span>
                        <span class="stat-label">Unassigned</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-number" id="myLeadsCount">-</span>
                        <span class="stat-label">My Leads</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-number" id="hotLeadsCount">-</span>
                        <span class="stat-label">Hot Leads</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-number" id="overdueTasks">-</span>
                        <span class="stat-label">Overdue</span>
                    </div>
                </div>
                <div class="queue-actions">
                    <button class="btn btn-primary" id="assignToMe">
                        <i class="fas fa-user-check"></i> Assign Selected to Me
                    </button>
                    <button class="btn btn-secondary" id="markAsHot">
                        <i class="fas fa-fire"></i> Mark as Hot
                    </button>
                    <select id="bulkAssign" class="form-select">
                        <option value="">Assign to Team Member...</option>
                        <option value="Rajesh">Rajesh</option>
                        <option value="Team Member">Team Member</option>
                    </select>
                </div>
            </div>
        </section>

        <!-- Lead Table Section -->
        <section class="table-section">
            <div class="table-header">
                <h2 class="section-title">Lead Management</h2>
                <div class="table-controls">
                    <div class="search-container">
                        <i class="fas fa-search"></i>
                        <input type="text" id="searchInput" placeholder="Search leads...">
                    </div>
                    <div class="filter-container">
                        <select id="statusFilter">
                            <option value="">All Status</option>
                            <option value="New Parent">New Parent</option>
                            <option value="Contacted">Contacted</option>
                            <option value="Follow-up">Follow-up</option>
                            <option value="Enrolled">Enrolled</option>
                            <option value="Not Interested">Not Interested</option>
                        </select>
                        <select id="ownerFilter">
                            <option value="">All Owners</option>
                            <option value="Unassigned">Unassigned</option>
                            <option value="Rajesh">Rajesh</option>
                            <option value="Team Member">Team Member</option>
                        </select>
                        <select id="priorityFilter">
                            <option value="">All Priorities</option>
                            <option value="High">High Priority</option>
                            <option value="Medium">Medium Priority</option>
                            <option value="Low">Low Priority</option>
                        </select>
                        <select id="sourceFilter">
                            <option value="">All Sources</option>
                            <option value="returning_students">Returning Students</option>
                            <option value="ats_qualifiers">ATS Qualifiers</option>
                            <option value="website">Website</option>
                            <option value="early_bird">Early Bird</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="table-container">
                <table class="leads-table" id="leadsTable">
                    <thead>
                        <tr>
                            <th><input type="checkbox" id="selectAll"></th>
                            <th class="sortable" data-sort="name">Name <i class="fas fa-sort"></i></th>
                            <th class="sortable" data-sort="email">Email <i class="fas fa-sort"></i></th>
                            <th class="sortable" data-sort="mobile">Mobile <i class="fas fa-sort"></i></th>
                            <th class="sortable" data-sort="status">Status <i class="fas fa-sort"></i></th>
                            <th class="sortable" data-sort="assignedOwner">Owner <i class="fas fa-sort"></i></th>
                            <th class="sortable" data-sort="interestLevel">Priority <i class="fas fa-sort"></i></th>
                            <th class="sortable" data-sort="source">Source <i class="fas fa-sort"></i></th>
                            <th class="sortable" data-sort="date">Date <i class="fas fa-sort"></i></th>
                            <th>Quick Actions</th>
                        </tr>
                    </thead>
                    <tbody id="leadsTableBody">
                        <!-- Table rows will be populated by JavaScript -->
                    </tbody>
                </table>
            </div>

            <!-- Pagination -->
            <div class="pagination">
                <button class="btn btn-outline" id="prevPage" disabled>
                    <i class="fas fa-chevron-left"></i> Previous
                </button>
                <div class="page-info">
                    <span id="pageInfo">Page 1 of 1</span>
                </div>
                <button class="btn btn-outline" id="nextPage" disabled>
                    Next <i class="fas fa-chevron-right"></i>
                </button>
            </div>
        </section>

        <!-- Action Center -->
        <section class="action-center" id="actionCenter" style="display: none;">
            <div class="action-header">
                <h3><span id="selectedCount">0</span> leads selected</h3>
                <button class="btn btn-text" id="clearSelection">Clear Selection</button>
            </div>
            <div class="bulk-actions">
                <button class="btn btn-primary" id="bulkCall">
                    <i class="fas fa-phone"></i> Call Selected
                </button>
                <button class="btn btn-primary" id="bulkEmail">
                    <i class="fas fa-envelope"></i> Email Selected
                </button>
                <select id="bulkStatusUpdate">
                    <option value="">Update Status...</option>
                    <option value="Contacted">Mark as Contacted</option>
                    <option value="Follow-up">Schedule Follow-up</option>
                    <option value="Enrolled">Mark as Enrolled</option>
                    <option value="Not Interested">Mark Not Interested</option>
                </select>
                <select id="bulkOwnerUpdate">
                    <option value="">Assign Owner...</option>
                    <option value="Rajesh">Assign to Rajesh</option>
                    <option value="Team Member">Assign to Team Member</option>
                    <option value="Unassigned">Mark Unassigned</option>
                </select>
                <button class="btn btn-warning" id="scheduleFollowup">
                    <i class="fas fa-calendar-plus"></i> Schedule Follow-up
                </button>
                <button class="btn btn-secondary" id="bulkExport">
                    <i class="fas fa-download"></i> Export Selected
                </button>
            </div>
        </section>
    </div>

    <!-- Lead Detail Modal -->
    <div class="modal" id="leadModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Lead Details</h3>
                <button class="modal-close" id="modalClose">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- Lead details will be populated here -->
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="modalCancel">Cancel</button>
                <button class="btn btn-primary" id="modalSave">Save Changes</button>
            </div>
        </div>
    </div>

    <!-- Toast Notifications -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Scripts -->
    <!-- Use proxy API to avoid 403 errors -->
    <script src="js/api-proxy.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
